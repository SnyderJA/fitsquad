<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0f172a"/>

  <!-- Kettlebell body -->
  <ellipse cx="256" cy="320" rx="90" ry="100" fill="#f97316"/>

  <!-- Kettlebell handle -->
  <path d="M 190 240 Q 190 160 256 160 Q 322 160 322 240"
        stroke="#f97316" stroke-width="28" fill="none" stroke-linecap="round"/>

  <!-- Inner cutout of handle -->
  <path d="M 210 240 Q 210 185 256 185 Q 302 185 302 240"
        stroke="#0f172a" stroke-width="16" fill="none" stroke-linecap="round"/>

  <!-- Kettlebell base highlight -->
  <ellipse cx="256" cy="340" rx="50" ry="20" fill="#fb923c" opacity="0.3"/>

  <!-- Weight text -->
  <text x="256" y="345" text-anchor="middle" font-size="56" font-family="Arial, sans-serif" font-weight="bold" fill="#0f172a" letter-spacing="-2">KB</text>
</svg>
